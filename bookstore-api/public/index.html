<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizza's Bookstore | Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: #2c3e50; }
        .book-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; position: relative; overflow: hidden; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .hero { background: #2c3e50; color: white; padding: 60px 0; margin-bottom: 30px; border-radius: 0 0 30px 30px; }
        .card-title { color: #2c3e50; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">📚 Fizza's Bookstore</a>
        <div id="authSection">
            <button class="btn btn-outline-light me-2 btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">Login</button>
            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#signupModal">Signup</button>
        </div>
        <div id="userSection" class="d-none text-white align-items-center">
            <span class="me-2">Hi, <span id="displayUserName" class="fw-bold text-info"></span></span>
            <button class="btn btn-danger btn-sm ms-2" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="hero text-center">
    <div class="container">
        <h1 class="display-5 fw-bold text-uppercase">My Personal Bookstore API</h1>
        <p class="lead opacity-75">Backend Internship Project - Books Database</p>
    </div>
</div>

<div class="container pb-5">
    <div id="booksList" class="row g-4">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div><br>
            Loading books from database...
        </div>
    </div>
</div>

<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content shadow-lg border-0">
            <div class="modal-header bg-primary text-white"><h5>User Login</h5></div>
            <div class="modal-body p-4">
                <input type="email" id="email" class="form-control mb-3" placeholder="Email Address">
                <input type="password" id="password" class="form-control mb-3" placeholder="Password">
                <button class="btn btn-primary w-100 fw-bold" onclick="loginUser()">Sign In</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="signupModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content shadow-lg border-0">
            <div class="modal-header bg-warning text-dark"><h5>New Account</h5></div>
            <div class="modal-body p-4">
                <input type="text" id="signupName" class="form-control mb-3" placeholder="Full Name">
                <input type="email" id="signupEmail" class="form-control mb-3" placeholder="Email Address">
                <input type="password" id="signupPassword" class="form-control mb-3" placeholder="Password">
                <button class="btn btn-warning w-100 fw-bold" onclick="signupUser()">Join Now</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = 'http://localhost:5000/api';

    async function getBooks() {
        try {
            const res = await fetch(`${API_URL}/books`);
            const data = await res.json();
            const container = document.getElementById('booksList');
            
            if (!data.books || data.books.length === 0) {
                container.innerHTML = '<div class="text-center w-100 mt-5"><h5>No books found in the database. 📚</h5></div>';
                return;
            }

            container.innerHTML = data.books.map(book => `
                <div class="col-md-4">
                    <div class="card h-100 book-card p-2">
                        <div class="card-body">
                            <h5 class="card-title fw-bold mb-1">${book.title}</h5>
                            <p class="text-muted small mb-3">by ${book.author}</p>
                            <h4 class="text-success fw-bold">Rs. ${book.price}</h4>
                            <hr class="opacity-25">
                            <div class="d-flex justify-content-between small text-secondary">
                                <span>ISBN: ${book.isbn}</span>
                                <span>📅 ${book.publishedDate ? book.publishedDate.split('T')[0] : 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            document.getElementById('booksList').innerHTML = '<div class="alert alert-danger text-center">Error connecting to server. Is your backend running?</div>';
        }
    }

    async function loginUser() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok && data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('name', data.user ? data.user.name : (data.name || 'User'));
                location.reload();
            } else {
                alert('Login Failed: ' + (data.message || 'Check credentials'));
            }
        } catch (err) { alert('Server Error during login'); }
    }

    async function signupUser() {
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const res = await fetch(`${API_URL}/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
        });
        if (res.ok) { alert('Signup successful! Please login.'); location.reload(); }
        else { alert('Signup failed.'); }
    }

    function checkAuth() {
        const name = localStorage.getItem('name');
        if (name) {
            document.getElementById('authSection').classList.add('d-none');
            const userSec = document.getElementById('userSection');
            userSec.classList.remove('d-none');
            userSec.classList.add('d-flex');
            document.getElementById('displayUserName').innerText = name;
        }
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    window.onload = () => { getBooks(); checkAuth(); };
</script>
</body>
</html>
